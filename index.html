<!DOCTYPE html>
<html>
<head>
    <title>Smart Attendance App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>📊 Smart Attendance App</h1>
</header>

<div class="dashboard">
    <div class="card">👨‍🎓 Students: <span id="totalStudents">0</span></div>
    <div class="card">📅 Classes: <span id="totalClasses">0</span></div>
</div>

<div class="container">

    <div class="form">
        <h2>Add Student</h2>
        <input id="name" placeholder="Name">
        <input id="roll" placeholder="Roll No">
        <button onclick="addStudent()">Add</button>
    </div>

    <div class="search">
        <input id="search" placeholder="🔍 Search..." onkeyup="searchStudent()">
    </div>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Roll</th>
                <th>Attendance</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="studentTable"></tbody>
    </table>

</div>

<script src="script.js"></script>
</body>
</html>
